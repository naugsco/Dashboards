# Pulse Dashboard - Nginx site configuration
# Compatible with Ubuntu 20.04/22.04, nginx 1.18+
#
# After getting a domain name, enable HTTPS:
#   sudo certbot --nginx -d yourdomain.com

server {
    listen 80;
    server_name _;  # Matches any hostname/IP. Replace _ with your domain when you have one.

    root /var/www/dashboard;
    index index.html;

    # Gzip compression for faster page loads
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # ── API requests → FastAPI backend ──────────────────────────────────────
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── React SPA routing ────────────────────────────────────────────────────
    # All unmatched paths serve index.html so React Router handles navigation
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, must-revalidate";
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    # React appends content hashes to filenames, so 1-year cache is safe
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
